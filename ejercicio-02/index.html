<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>2. Métodos para Arrays JavaScript</title>
	<style>
		body {
			margin: 0;
			font-family: Arial, Helvetica, sans-serif;
			background: linear-gradient(180deg, #eff6ff 0%, #dbeafe 100%);
			color: #0f172a;
			min-height: 100vh;
			display: flex;
			justify-content: center;
			align-items: center;
			padding: 1rem;
			box-sizing: border-box;
		}

		main {
			width: 100%;
			max-width: 42rem;
			padding: 2rem;
			background: #ffffff;
			border-radius: 1rem;
			box-shadow: 0 0.75rem 2rem rgba(15, 23, 42, 0.12);
		}

		h1 {
			margin-top: 0;
			margin-bottom: 0.75rem;
		}

		p {
			line-height: 1.5;
		}

		#display {
			margin-top: 1rem;
			padding: 1rem;
			border-radius: 0.75rem;
			background: #f8fafc;
			border: 1px solid #cbd5e1;
		}

		.volver {
			display: inline-block;
			margin-top: 1rem;
			padding: 0.7rem 1rem;
			border-radius: 0.7rem;
			background: #e2e8f0;
			color: #1e293b;
			text-decoration: none;
			font-weight: 600;
		}

		.volver:hover {
			background: #cbd5e1;
		}
	</style>
</head>
<body>
	<main>
		<h1>2. Métodos para Arrays JavaScript</h1>
		<p>Ejemplo básico recorriendo un array de cursos. Revisa también la consola del navegador para ver la salida.</p>
		<div id="display">

		</div>
		<a class="volver" href="../index.html">Volver al índice</a>
	</main>

	<script>
		// Array inicial con cursos.
		let cursos = ["1eso", "2eso", "3eso", "4eso"];
		// push agrega un elemento al final del array.
		cursos.push("1smr");
		// cursos.pop();
		// cursos.pop();
		// cursos.shift("");
		// cursos.reverse();
		// cursos.sort();
		// cursos.unshift("1bach");
		// splice(2, 1): desde el indice 2 elimina 1 elemento ("3eso").
		cursos.splice(2,1);
		// cursos=cursos.map(function(c) {
		// 	return c+"Bosco"
		// });

		// map recorre el array y crea uno nuevo transformando cada valor.
		cursos = cursos.map(c => c + "Bosco");
		// indexOf busca la posicion del elemento exacto.
		// Como ahora todos terminan en "Bosco", "1eso" no existe y devuelve -1.
		alert(cursos.indexOf("1eso"));

		// for (let i = 0; i < cursos.length; i++) {
		// 	document.getElementById("display").innerHTML = document.getElementById("display").innerHTML + "<br>" + cursos[i];
		// }

		// Recorremos el array con for...of y pintamos cada curso en el DOM.
		for (let curso of cursos ){
			document.getElementById("display").innerHTML = document.getElementById("display").innerHTML + "<br>" + curso;

		}


	</script>
</body>
</html>
