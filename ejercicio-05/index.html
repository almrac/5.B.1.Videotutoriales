<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>5. Chuleta JSON</title>
	<style>
		body {
			margin: 0;
			font-family: Arial, Helvetica, sans-serif;
			background: linear-gradient(180deg, #eff6ff 0%, #dbeafe 100%);
			color: #0f172a;
			min-height: 100vh;
			display: flex;
			justify-content: center;
			align-items: center;
			padding: 1rem;
			box-sizing: border-box;
		}

		main {
			width: 100%;
			max-width: 42rem;
			padding: 2rem;
			background: #ffffff;
			border-radius: 1rem;
			box-shadow: 0 0.75rem 2rem rgba(15, 23, 42, 0.12);
		}

		h1 {
			margin-top: 0;
			margin-bottom: 0.75rem;
		}

		p {
			line-height: 1.5;
		}
			#display {
				margin-top: 1rem;
				padding: 1rem;
				border-radius: 0.75rem;
				background: #f8fafc;
				border: 1px solid #cbd5e1;
			}
		button {
			padding: 0.85rem 1.2rem;
			border: none;
			border-radius: 0.7rem;
			background: #2563eb;
			color: #ffffff;
			font-size: 1rem;
			font-weight: bold;
			cursor: pointer;
		}

		button:hover {
			background: #1d4ed8;
		}

		.volver {
			display: inline-block;
			margin-top: 1rem;
			padding: 0.7rem 1rem;
			border-radius: 0.7rem;
			background: #e2e8f0;
			color: #1e293b;
			text-decoration: none;
			font-weight: 600;
		}

		.volver:hover {
			background: #cbd5e1;
		}
	</style>
</head>
<body>
	<main>
		<h1>5. Chuleta JSON</h1>
		<p>Plantilla preparada con el mismo estilo visual para mantener coherencia entre ejercicios.</p>
			<div id="display">
				<!-- Botón principal: mantiene el id para poder capturarlo desde JavaScript -->
				<button id="descargarpdf" type="button">Descargar chula JSON</button>
			</div>

		<a class="volver" href="../index.html">Volver al índice</a>
		</main>

		<script>
			// 1) Seleccionamos el botón del DOM por su id.
			const botonDescargaPdf = document.getElementById('descargarpdf');

			// 2) Escuchamos el evento click para ejecutar una acción.
			botonDescargaPdf.addEventListener('click', () => {
				// 3) Abrimos el PDF en una nueva pestaña.
				window.open('https://drive.google.com/file/d/1bvL2MK1db8EuDz_rATWwl5gmiXeQ4gms/view', '_blank');
			});
		</script>
	</body>
</html>
